name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: python -m pytest

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[docs]"
      - run: python -m sphinx -W --keep-going -b html docs/source docs/build/html

  package:
    name: Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build --outdir dist
      - run: python -m twine check dist/*
      - name: Smoke-test the installed wheel
        run: |
          python -m venv /tmp/fastop-wheel
          /tmp/fastop-wheel/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/fastop-wheel/bin/python -c "from fastop import spaces; assert spaces.lens_space(7, 3).cohomology(p=3).operation_rank(2, 1) == 1"
