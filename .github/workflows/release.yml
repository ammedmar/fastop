name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Check version and release tag
        id: metadata
        env:
          PYTHONPATH: src
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -c 'import os; from fastop import __version__; tag = os.environ.get("RELEASE_TAG"); assert ".dev" not in __version__, f"development version cannot be published: {__version__}"; assert not tag or tag == f"v{__version__}", f"tag {tag!r} does not match v{__version__}"; open(os.environ["GITHUB_OUTPUT"], "a").write(f"version={__version__}\n")'

  build-sdist:
    name: Build source distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build
      - run: python -m build --sdist --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
          - macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install cibuildwheel==3.4.1
      - run: python -m cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  distributions:
    name: Validate release artifacts
    needs: [validate, build-sdist, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - run: python -m pip install twine
      - run: python -m twine check dist/*
      - name: Check artifact coverage
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python -c 'import os; from pathlib import Path; version = os.environ["RELEASE_VERSION"]; files = list(Path("dist").iterdir()); assert any(path.name == f"fastop-{version}.tar.gz" for path in files); wheels = [path for path in files if path.suffix == ".whl"]; assert wheels, "no wheels were built"; print(f"validated one sdist and {len(wheels)} wheels")'
      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/fastop
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fastop
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
